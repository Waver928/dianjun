<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>批发交易量监测台账</title><style>:root{--card:#fff;--ink:#1d2825;--muted:#66736f;--line:#dce6e1;--green:#20784d;--soft:#f8fbf9;--shadow:0 14px 32px rgba(28,41,37,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eaf3ef,#f7f9f8 38%,#eef3f1);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;color:var(--ink)}button,select,input{font:inherit}.content{max-width:1480px;margin:auto;padding:18px 22px 28px}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:14px}.top h1{margin:0;font-size:24px}.top p{margin:7px 0 0;color:var(--muted);font-size:13px}.actions{display:flex;gap:8px}.btn{height:34px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:0 12px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}.btn.primary{border:0;background:var(--green);color:#fff}.card{border:1px solid var(--line);background:rgba(255,255,255,.88);border-radius:8px;box-shadow:var(--shadow)}.head{min-height:58px;padding:14px 16px 10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.head h2{margin:0;font-size:16px}.head p{margin:4px 0 0;color:var(--muted);font-size:12px}
.tablewrap{padding:0 14px 14px;overflow:auto}table{width:100%;min-width:1080px;border-collapse:collapse;font-size:13px}th,td{padding:10px 9px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{background:var(--soft);color:var(--muted)}.modal{position:fixed;inset:0;background:rgba(20,31,28,.42);display:none;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.dialog{width:min(860px,100%);background:#fff;border-radius:8px;box-shadow:0 22px 60px rgba(0,0,0,.24);border:1px solid var(--line)}.dialog-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}.dialog-head h3{margin:0;font-size:16px}.close{width:32px;height:32px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer}.form{padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:5px}.field label{font-size:12px;color:var(--muted)}.field input,.field select{height:38px;border:1px solid #cad8d3;border-radius:6px;background:#fff;color:var(--ink);padding:0 10px}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;padding:0 16px 16px}.foot{margin-top:14px;color:var(--muted);font-size:12px;line-height:1.6}@media(max-width:760px){.content{padding:14px}.top,.head{flex-direction:column;align-items:flex-start}.form{grid-template-columns:1fr}}</style></head><body><main class="content">
<section class="top"><div><h1>批发交易量监测台账</h1><p>用于录入批发交易量、成交均价、交易额和交易时段，支撑批发交易量监测统计分析。</p></div><div class="actions"><a class="btn" href="wholesale-volume-monitor.html">返回监测看板</a><button class="btn primary" id="openAdd">新增</button></div></section><section class="card"><div class="head"><div><h2>台账列表</h2><p>点击“新增”弹窗录入交易记录。</p></div></div><div class="tablewrap"><table><thead><tr><th>交易日期</th><th>交易时段</th><th>批发市场</th><th>特色农产品</th><th>规格/口径</th><th>交易量(吨)</th><th>成交均价</th><th>交易额(万元)</th><th>交易主体</th><th>录入人</th></tr></thead><tbody id="rows"></tbody></table></div></section><p class="foot">注：交易额按“交易量(吨) × 成交均价(元/公斤) × 0.2”折算为万元。</p></main>
<div class="modal" id="modal"><div class="dialog"><div class="dialog-head"><h3>新增批发交易记录</h3><button class="close" id="closeModal">×</button></div><div class="form"><div class="field"><label>交易日期</label><input id="date" type="date" value="2026-06-29"></div><div class="field"><label>交易时段</label><select id="slot"><option>05-08</option><option>08-11</option><option selected>11-14</option><option>14-17</option><option>17-20</option></select></div><div class="field"><label>批发市场</label><select id="market"><option>宜昌三峡物流园</option><option>点军产地集配点</option><option>合作社统销点</option></select></div><div class="field"><label>特色农产品</label><select id="product"><option>点军蜜橘/柑橘</option><option>桥边精品小水果</option><option>草鱼</option><option>小龙虾</option><option>本地时蔬</option></select></div><div class="field"><label>规格/口径</label><select id="spec"><option>统货</option><option>一级</option><option>精品/分级包装</option><option>产地直供</option></select></div><div class="field"><label>交易量(吨)</label><input id="volume" type="number" value="18.5" step="0.1"></div><div class="field"><label>成交均价(元/公斤)</label><input id="price" type="number" value="4.82" step="0.01"></div><div class="field"><label>交易主体</label><input id="subject" value="桥边合作社"></div><div class="field"><label>录入人</label><input id="operator" value="市场管理员"></div></div><div class="dialog-actions"><button class="btn" id="cancelAdd">取消</button><button class="btn primary" id="saveAdd">保存</button></div></div></div>
<script>
const seed=[['2026-06-29','11-14','点军产地集配点','点军蜜橘/柑橘','统货',32,4.82,'桥边合作社','市场管理员'],['2026-06-29','08-11','宜昌三峡物流园','草鱼','产地直供',26,14.8,'水产经营户','市场管理员'],['2026-06-29','14-17','合作社统销点','桥边精品小水果','精品/分级包装',12.5,12.6,'水果合作社','市场管理员']];
const rows=document.getElementById('rows'),modal=document.getElementById('modal');
function amount(v,p){return (Number(v)*Number(p)*0.2).toFixed(1)}
function add(r){const tr=document.createElement('tr');tr.innerHTML=`<td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${amount(r[5],r[6])}</td><td>${r[7]}</td><td>${r[8]}</td>`;rows.prepend(tr)}
seed.reverse().forEach(add);
function close(){modal.classList.remove('show')}
openAdd.onclick=()=>modal.classList.add('show');
closeModal.onclick=close;cancelAdd.onclick=close;
modal.onclick=e=>{if(e.target===modal)close()};
saveAdd.onclick=()=>{add([date.value,slot.value,market.value,product.value,spec.value,volume.value,price.value,subject.value,operator.value]);close()};
</script></body></html>
